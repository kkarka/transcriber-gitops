environment: "development"
replicaCount: 1
image:
  # This tells Helm to pull the latest code merged into the develop branch
  tag: "1.1.0"
api:
  repository: ghcr.io/kkarka/video-transcriber-api
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
worker:
  replicaCount: 1
  repository: ghcr.io/kkarka/video-transcriber-worker
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi" # Minimum guaranteed memory
    limits:
      cpu: "1000m" # Allow up to 2 CPUs for faster Whisper processing
      memory: "1Gi" # Hard limit to match your docker-compose setup
frontend:
  repository: ghcr.io/kkarka/video-transcriber-frontend
ingress:
  enabled: true
  host: transcriber.arkadevops.in
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:894565488699:certificate/c45e1cfc-994b-47e9-861c-cddcbb6a181b
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/group.order: '1'
    alb.ingress.kubernetes.io/healthcheck-path: /health
  hosts:
    - host: transcriber.arkadevops.in # Use your subdomain
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: transcriber-frontend
              port:
                number: 80
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: transcriber-api
              port:
                number: 80
# We will encrypt the actual password shortly!
database:
  user: "transcriberadmin"
  databaseName: "transcriberdb?sslmode=require"
storage:
  mode: "s3"
  bucketName: "transcriber-uploads-storage-arka-dev" # Make sure this matches your actual S3 bucket name
  region: "ap-south-1"
