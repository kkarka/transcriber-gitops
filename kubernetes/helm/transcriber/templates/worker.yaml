# kubernetes/helm/transcriber/templates/worker.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcriber-worker
  labels:
    app: worker
spec:
  # Workers can often be scaled independently, but we'll tie it to replicaCount for now
  replicas: {{ .Values.worker.replicaCount }}  
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              value: "{{ .Values.database.user }}"
            - name: POSTGRES_DB
              value: "{{ .Values.database.databaseName }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transcriber-db-secret
                  key: DB_PASSWORD
            - name: REDIS_HOST
              value: "transcriber-redis"
            - name: DB_HOST
              value: "{{ .Values.database.host }}"
            # --- NEW HYBRID STORAGE VARS ---
            - name: STORAGE_MODE
              value: "{{ .Values.storage.mode }}"
            - name: S3_VIDEO_BUCKET_NAME
              value: "{{ .Values.storage.bucketName }}"
            - name: AWS_DEFAULT_REGION
              value: "{{ .Values.storage.region }}"
            - name: HUGGINGFACE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: transcriber-aws-secret
                  key: HUGGINGFACE_API_KEY
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}