
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: transcriber-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  serviceName: transcriber-postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "{{ .Values.database.user }}"
            - name: POSTGRES_DB
              value: "{{ .Values.database.databaseName }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transcriber-db-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: transcriber-postgres
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432