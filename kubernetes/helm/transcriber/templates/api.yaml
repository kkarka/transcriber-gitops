# kubernetes/helm/transcriber/templates/api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcriber-api
  labels:
    app: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Dynamically pulls from your GitHub Container Registry
          image: "{{ .Values.api.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # Plain-text variables from values.yaml
            - name: POSTGRES_USER
              value: "{{ .Values.database.user }}"
            - name: POSTGRES_DB
              value: "{{ .Values.database.databaseName }}"
            # Secure variable decrypted from Sealed Secrets
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transcriber-db-secret
                  key: POSTGRES_PASSWORD
            # Tell the API where to find Redis and the DB inside the cluster
            - name: REDIS_HOST
              value: "transcriber-redis"
            - name: DB_HOST
              value: "transcriber-postgres"
          # Dynamically injects the CPU/Memory limits based on the environment
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: transcriber-api
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000